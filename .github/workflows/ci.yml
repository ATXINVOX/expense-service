name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "version-*"]
    tags: ["v*"]
  pull_request:
    branches: [main, develop, "version-*"]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/atxinvox/frappe-microservice-lib:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. pytest tests/ \
            -m "not integration" \
            --cov=controllers \
            --cov=expense_tracker \
            --cov-report=term-missing \
            --cov-branch \
            -v --tb=short

  integration-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout expense-service
        uses: actions/checkout@v4

      - name: Checkout frappe-microservice-lib (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: ATXINVOX/frappe-microservice-lib
          path: ../frappe-microservice-lib
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start integration container
        run: docker compose -f docker-compose.integration.yml up -d

      - name: Wait for Frappe site
        run: |
          BENCH="/home/frappe/frappe-bench"
          PYTHON="$BENCH/env/bin/python"
          for i in $(seq 1 40); do
            if docker compose -f docker-compose.integration.yml exec -T dev-central-site \
              bash -c "mkdir -p $BENCH/dev.localhost/logs /home/frappe/logs && \
              $PYTHON -c \"
          import frappe
          frappe.init(site='dev.localhost', sites_path='$BENCH/sites')
          frappe.connect()
          frappe.db.sql('SELECT 1')
          frappe.destroy()
          print('ready')
          \"" 2>/dev/null; then
              echo "Site ready"; exit 0
            fi
            echo "  attempt $i/40..."; sleep 10
          done
          echo "FATAL: site not ready" && exit 1

      - name: Bootstrap ERPNext test data
        run: |
          BENCH="/home/frappe/frappe-bench"
          PYTHON="$BENCH/env/bin/python"
          HAS_COMPANY=$(docker compose -f docker-compose.integration.yml exec -T dev-central-site \
            "$PYTHON" -c "
          import frappe
          frappe.init(site='dev.localhost', sites_path='$BENCH/sites')
          frappe.connect()
          print(frappe.db.count('Company'))
          frappe.destroy()
          " 2>/dev/null || echo "0")
          if [ "$HAS_COMPANY" = "0" ]; then
            echo "No Company — bootstrapping ERPNext test data"
            docker compose -f docker-compose.integration.yml exec -T dev-central-site \
              bash -c "cd $BENCH && bench --site dev.localhost execute erpnext.setup.utils.before_tests"
          fi

      - name: Install frappe-microservice lib and test deps
        run: |
          docker compose -f docker-compose.integration.yml exec -T dev-central-site \
            /home/frappe/frappe-bench/env/bin/pip install --quiet /mnt/lib pytest pytest-cov

      - name: Run integration tests with coverage
        run: |
          docker compose -f docker-compose.integration.yml exec -T dev-central-site \
            /home/frappe/frappe-bench/env/bin/python -m pytest \
              /mnt/expense/tests/integration/ \
              --confcutdir=/mnt/expense/tests/integration \
              -c /mnt/expense/tests/integration/pytest.ini \
              --cov=controllers \
              --cov=expense_tracker \
              --cov-report=term-missing \
              --cov-branch \
              --rootdir=/mnt/expense \
              -v --tb=short

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.integration.yml down -v

  build:
    needs: [test, integration-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Calculate Image Tag & Versions
        id: vars
        run: |
          # Default values
          TAG="latest"
          VERSION="version-16"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="pr-${{ github.event.number }}"
            # Use base branch version for PRs if it's a version branch
            if [[ "${{ github.base_ref }}" == version-* ]]; then
              VERSION="${{ github.base_ref }}"
            elif [[ "${{ github.base_ref }}" == "develop" ]]; then
              VERSION="develop"
            fi
          elif [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            TAG="develop"
            VERSION="develop"
          elif [[ "${{ github.ref }}" == refs/heads/version-* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/heads\///')
            TAG="$VERSION"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="latest"
            VERSION="version-16"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Convert repository name to lowercase for GHCR
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=ghcr.io/$REPO_LOWER" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}
          build-args: |
            BASE_TAG=latest
